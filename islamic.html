<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Life</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body style="background-image: url(assets/img/background2.jpg); background-size: cover; background-repeat: no-repeat;">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary text-light">
        <div class="container-fluid">
            <div class="d-flex justify-content-center flow">
                <button class="btn border-0 text-light">
                    <i class="fa fa-map-marker" aria-hidden="true" onclick="getUserLocation()"></i>
                </button>
                <small id="currentLocation"></small>
            </div>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse ms-auto" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <div class="col-md-8">
                            <select id="districtSelect" class="form-control form-select-sm"
                                onchange="fetchTimingsByDistrict()">
                                <option value="">District</option>
                            </select>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Background Overlay -->
    <div class="background-overlay"></div>

    <!-- Main Container -->
    <div class="container mt-4">
        <!-- Header Section -->
        <div class="d-flex justify-content-between text-light mt-2 flex-wrap">
            <div>
                <div id="datetime"></div>
                <div id="arabicDatetime"></div>
            </div>
            <div>
                <div><i class="fa fa-sun-o text-warning"></i> Sunrise: <span id="sunriseTime"></span></div>
                <div><i class="fa fa-moon-o text-light"></i> Sunset: <span id="sunsetTime"></span></div>
                <div><i class="fa fa-thermometer-half" aria-hidden="true"></i> Temperature: <span
                        id="temperature">Loading...</span></div>
            </div>
        </div>

        <!-- Loader -->
        <div id="loader" class="text-center mt-3" style="display: none;">
            <div class="spinner-border text-light" role="status"></div>
            <p class="text-light">Loading...</p>
        </div>

        <!-- Cards Row -->
        <div class="row mt-4 g-3">
            <!-- Prayer Times -->
            <div class="col-12 col-md-4">
                <div class="equal-height text-light">
                    <h4 id="locationName" style="display: none;"></h4>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Fajr:</span><span id="fajrTime">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Salatul Duha:</span><span id="duhaStartTime">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning" id="jummahOrDuhar">Dhuhr:</span><span id="dhuhrTime">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Asr:</span><span id="asrTime">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Maghrib:</span><span id="maghribTime">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Isha:</span><span id="ishaTime">-</span>
                    </div>
                    <div id="forbiddenMessage" class="text-danger text-center mt-2"></div>
                </div>
            </div>

            <!-- Current Prayer Countdown -->
            <div class="col-12 col-md-4">
                <div class="equal-height text-light text-center">
                    <span id="currentPrayer"></span>
                    <span class="d-block">Time is running out</span>
                    <div class="d-flex justify-content-center mt-2">
                        <div id="countdownCircle" class="countdown-circle">
                            <span id="countdownTime">--:--</span>
                        </div>
                    </div>
                    <div class="mt-4 mosque-door" style="display: none;">
                        <div class="d-flex justify-content-between w-100">
                            <span class="text-warning">Current:</span>
                            <span class="text-light" id="currentPrayer">---</span>
                        </div>
                        <div class="d-flex justify-content-between w-100">
                            <span class="text-warning">Start Time:</span>
                            <span class="text-light" id="currentPrayerStart">--:--</span>
                        </div>
                        <div class="d-flex justify-content-between w-100">
                            <span class="text-warning">End Time:</span>
                            <span class="text-light" id="currentPrayerEnd">--:--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sehri & Iftar -->
            <div class="col-12 col-md-4">
                <div class="equal-height text-light">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">First third:</span><span id="firstthird">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Mid Night:</span><span id="midnight">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Last third:</span><span id="lastthird">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Sehri Ends:</span><span id="sehriTime">-</span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-warning">Iftar Starts:</span><span id="iftarTime">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Method and Madhhab Selection -->
        <div class="row d-flex justify-content-between mt-4">
            <div class="col-md-4">
                <span class="text-light">Based On: </span>
                <span id="selectedMethod" class="text-warning"></span>
                <span class="text-light" onclick="showDropdown()" style="cursor: pointer;"><b>Change</b></span>
                <select id="methodSelect" class="form-control form-select-sm d-none"
                    onchange="updateSelectedMethod()">
                    <option value="1">University of Islamic Sciences, Karachi</option>
                    <option value="2">Islamic Society of North America (ISNA)</option>
                    <option value="3">Umm al-Qura, Makkah</option>
                    <option value="4">Muslim World League (MWL)</option>
                    <option value="5">Egyptian General Authority of Survey</option>
                </select>
            </div>
            <div class="col-md-3 mt-2">
                <div class="text-end" style="display: none;">
                    <input type="radio" id="shafi" name="madhhab" value="0"
                        onchange="fetchSelectedPrayerTimesByMethod()">
                    <label for="shafi" class="text-light">Shafi</label>
                    <input type="radio" id="hanafi" name="madhhab" value="1" checked
                        onchange="fetchSelectedPrayerTimesByMethod()">
                    <label for="hanafi" class="text-light">Hanafi</label>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="app.js"></script>
</body>

</html>
